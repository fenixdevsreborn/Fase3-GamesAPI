# ------------------------------------------------------------------------------
# Publish image — Build e push da imagem (Postgres + API) no ECR.
# Apenas publicação no ECR; sem trigger para orquestrador/infra.
# ------------------------------------------------------------------------------

name: Publish image

on:
  push:
    branches: [junonn/mvp-aws]

env:
  SERVICE_NAME: games-api
  DOTNET_VERSION: "10.0.x"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_ECR }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker meta (tags)
        id: meta
        run: |
          REGISTRY="${{ steps.ecr.outputs.registry }}"
          REPO="${{ vars.ECR_REPOSITORY_NAME || 'fcg/fase03' }}"
          echo "tags=${REGISTRY}/${REPO}:games-api-latest" >> $GITHUB_OUTPUT
          echo "image_tag=games-api:games-api-latest" >> $GITHUB_OUTPUT

      - name: Build image
        run: docker build -f Dockerfile.postgres -t ${{ steps.meta.outputs.tags }} .

      - name: Push image
        run: docker push ${{ steps.meta.outputs.tags }}
